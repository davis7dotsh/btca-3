packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  '@effect/platform-node': 4.0.0-beta.40
  "@sveltejs/adapter-vercel": ^6.3.3
  "@types/node": ^24
  "@useautumn/convex": ^0.0.23
  autumn-js: ^1.1.2
  convex: ^1.34.0
  effect: 4.0.0-beta.40
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
